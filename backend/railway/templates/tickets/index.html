{% extends "tickets/base.html" %}

{% block title %}
Train Ticket Reservation System
{% endblock %}

{% block content %}

<div class="division1">
  <h1 class="main_heading">Railway Ticket Reservation</h1>
  <p>Book your train in seconds</p>
</div>

<div class="division2">
  <h2>Search Trains</h2>
  <input type="text" id="source" placeholder="Source">
  <input type="text" id="destination" placeholder="Destination">
  <button id="searchBtn">Search</button>
</div>

<div class="division3">
  <h2>Available Trains</h2>
  <div id="trainList" class="innerdiv1"></div>
</div>

<div class="division4">
  <h2>My Bookings</h2>
  <div id="bookingHistory"></div>
</div>

{% endblock %}
