<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Train Ticket Reservation System</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="division1">
    <h1 class="main_heading">Railway Ticket Reservation</h1>
    <p>Book your train in seconds</p>
  </div>

  <div class="division2">
    <h2>Search Trains</h2>
    <input type="text" id="source" placeholder="Source">
    <input type="text" id="destination" placeholder="Destination">
    <button id="searchBtn">Search</button>
  </div>

<div class="division3">
  <h2>Available Trains</h2>
  <div id="trainList" class="innerdiv1">
  </div>
</div>

<div class="division4">
  <h2>My Bookings</h2>
  <div id="bookingHistory">
  </div>
</div>

  <script src="scripts.js"></script>
</body>
</html>
